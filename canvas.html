<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER — Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        #map {
            flex: 1;
            background: #000;
        }
        /* Invert OSM tiles: white outlines on pure black */
        .leaflet-tile-pane {
            filter: invert(1) grayscale(1) contrast(4) brightness(0.5);
        }
        /* Kill all leaflet UI chrome */
        .leaflet-control-attribution { display: none !important; }
        /* Popup styling */
        .leaflet-popup-content-wrapper {
            background: #000;
            border: 1px solid #fff;
            border-radius: 0;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.5;
            padding: 0;
        }
        .leaflet-popup-content {
            margin: 12px 14px;
        }
        .leaflet-popup-tip {
            background: #000;
            border: 1px solid #fff;
            border-top: none;
            border-left: none;
        }
        .leaflet-popup-close-button {
            color: #fff !important;
            font-size: 16px !important;
        }
        .popup-date {
            font-size: 9px;
            letter-spacing: 1px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .popup-text {
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .popup-loc {
            font-size: 9px;
            color: #666;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .entry-count {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-size: 10px;
            letter-spacing: 2px;
            color: #555;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
        }
        .map-arrow {
            position: absolute;
            bottom: 24px;
            z-index: 1000;
            background: none;
            border: 1px solid #fff;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .map-arrow:hover { background: #222; }
        .map-arrow-left { left: 24px; }
        .map-arrow-right { right: 24px; }
    </style>
</head>
<body>
    <div class="page hidden" id="app">
        <nav>
            <span class="logo">Weather</span>
            <div class="links">
                <a href="journal.html">Log</a>
                <a href="history.html">History</a>
                <a href="canvas.html" class="active">Map</a>
                <a href="collective.html">Collective</a>
            </div>
        </nav>
        <div id="map"></div>
        <div id="map-nav" class="hidden">
            <button id="btn-prev-entry" class="map-arrow map-arrow-left">&larr;</button>
            <button id="btn-next-entry" class="map-arrow map-arrow-right">&rarr;</button>
        </div>
        <div class="entry-count" id="entry-count"></div>
    </div>
    <div class="loading-screen" id="loading">...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="canvas.js"></script>
</body>
</html>
