<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gate-btn {
            padding: 16px 60px; background: #fff; color: #000;
            font-family: var(--font); font-size: 14px; letter-spacing: 4px;
            text-transform: uppercase; border: none; cursor: pointer;
            font-weight: 700;
        }
        .gate-btn:hover { opacity: 0.85; }
        .gate-link {
            font-size: 11px; letter-spacing: 2px; color: #fff;
            cursor: pointer; text-transform: uppercase; margin-top: 8px;
        }
        .gate-link:hover { text-decoration: underline; }
        .auth-box { width: 280px; display: flex; flex-direction: column; gap: 12px; }
        .auth-input {
            background: transparent; border: 1px solid #fff; color: #fff;
            font-family: var(--font); font-size: 12px; letter-spacing: 1px;
            padding: 10px 14px; outline: none;
        }
        .auth-input::placeholder { color: #444; }
        .auth-input:focus { border-color: #fff; }
        .auth-error { color: #f44; font-size: 10px; letter-spacing: 1px; text-align: center; min-height: 14px; }
        .auth-back {
            font-size: 10px; letter-spacing: 1px; color: #555;
            text-align: center; cursor: pointer; text-transform: uppercase;
        }
        .auth-back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-page hidden" id="screen">
        <h1>WEATHER</h1>
        <p class="subtitle">a journal of the sky</p>

        <!-- Logged-in gate: ENTER + Log out -->
        <div id="gate-logged" style="display:none;flex-direction:column;align-items:center;gap:16px;">
            <button class="gate-btn" id="btn-enter-main">ENTER</button>
            <div class="gate-link" id="btn-logout">Log out</div>
        </div>

        <!-- Logged-out gate: ENTER (login) + Create Account -->
        <div id="gate-auth" style="display:none;flex-direction:column;align-items:center;gap:16px;">
            <button class="gate-btn" id="btn-enter">ENTER</button>
            <div class="gate-link" id="btn-create">Create Account</div>
        </div>

        <!-- Auth form -->
        <div class="auth-box hidden" id="auth-box">
            <input class="auth-input" type="text" id="input-email" placeholder="Email">
            <input class="auth-input" type="password" id="input-password" placeholder="Password">
            <div class="auth-error" id="auth-error"></div>
            <button class="gate-btn" id="btn-submit" style="width:100%;padding:12px;">LOG IN</button>
            <div class="auth-back" id="auth-back">Back</div>
        </div>
    </div>
    <div class="loading-screen" id="loading">...</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script>
        var screen = document.getElementById('screen');
        var loadingEl = document.getElementById('loading');
        var gateLogged = document.getElementById('gate-logged');
        var gateAuth = document.getElementById('gate-auth');
        var authBox = document.getElementById('auth-box');
        var inputEmail = document.getElementById('input-email');
        var inputPassword = document.getElementById('input-password');
        var authError = document.getElementById('auth-error');
        var btnSubmit = document.getElementById('btn-submit');

        var isLogin = true;
        var loggedIn = false;

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        auth.onAuthStateChanged(function(user) {
            loadingEl.classList.add('hidden');
            screen.classList.remove('hidden');
            loggedIn = !!user;

            // Reset to gate view
            authBox.classList.add('hidden');

            if (user) {
                gateLogged.style.display = 'flex';
                gateAuth.style.display = 'none';
            } else {
                gateAuth.style.display = 'flex';
                gateLogged.style.display = 'none';
            }
        });

        // Logged in: ENTER goes straight to journal
        document.getElementById('btn-enter-main').addEventListener('click', function() {
            window.location.href = 'journal.html';
        });

        // Logged in: Log out
        document.getElementById('btn-logout').addEventListener('click', function() {
            doSignOut();
        });

        // Not logged in: ENTER shows login form
        document.getElementById('btn-enter').addEventListener('click', function() {
            isLogin = true;
            btnSubmit.textContent = 'LOG IN';
            gateAuth.style.display = 'none';
            authBox.classList.remove('hidden');
            inputEmail.focus();
        });

        // Not logged in: Create Account
        document.getElementById('btn-create').addEventListener('click', function() {
            isLogin = false;
            btnSubmit.textContent = 'CREATE ACCOUNT';
            gateAuth.style.display = 'none';
            authBox.classList.remove('hidden');
            inputEmail.focus();
        });

        // Back to gate
        document.getElementById('auth-back').addEventListener('click', function() {
            authBox.classList.add('hidden');
            gateAuth.style.display = 'flex';
            authError.textContent = '';
            inputEmail.value = '';
            inputPassword.value = '';
        });

        btnSubmit.addEventListener('click', submit);
        inputPassword.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
        inputEmail.addEventListener('keydown', function(e) { if (e.key === 'Enter') inputPassword.focus(); });

        function submit() {
            var email = inputEmail.value.trim();
            var pass = inputPassword.value;
            authError.textContent = '';

            if (!email || !pass) { authError.textContent = 'Enter email and password'; return; }
            if (pass.length < 6) { authError.textContent = 'Password must be at least 6 characters'; return; }

            btnSubmit.disabled = true;
            btnSubmit.textContent = '...';

            var promise = isLogin
                ? auth.signInWithEmailAndPassword(email, pass)
                : auth.createUserWithEmailAndPassword(email, pass);

            promise.then(function() {
                // After login/signup, show logged-in gate (not auto-redirect)
            }).catch(function(err) {
                var msg = err.message || 'Something went wrong';
                if (err.code === 'auth/user-not-found') msg = 'No account with that email';
                if (err.code === 'auth/wrong-password') msg = 'Wrong password';
                if (err.code === 'auth/invalid-credential') msg = 'Invalid email or password';
                if (err.code === 'auth/email-already-in-use') msg = 'Email already in use';
                if (err.code === 'auth/weak-password') msg = 'Password too weak (min 6 chars)';
                if (err.code === 'auth/invalid-email') msg = 'Invalid email format';
                authError.textContent = msg;
                btnSubmit.disabled = false;
                btnSubmit.textContent = isLogin ? 'LOG IN' : 'CREATE ACCOUNT';
            });
        }
    </script>
</body>
</html>
